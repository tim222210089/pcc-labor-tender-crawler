name: Daily PCC Labor Tender Crawler

on:
  workflow_dispatch:
  schedule:
    # 06:45 Asia/Taipei every weekday. Fallback until external cron-job.org trigger is verified.
    - cron: '45 22 * * 0-4'

permissions:
  contents: read

jobs:
  crawl-upload-notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web Crawler
    env:
      GOOGLE_DRIVE_OAUTH_CONFIG: ${{ secrets.GOOGLE_DRIVE_OAUTH_CONFIG }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GMAIL_CLIENT_OR_SERVICE_CONFIG: ${{ secrets.GMAIL_CLIENT_OR_SERVICE_CONFIG }}
      GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: Web Crawler/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest -v

      - name: Resolve Taipei date
        id: taipei-date
        shell: bash
        run: echo "today=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_OUTPUT"

      - name: Run crawler workflow
        run: |
          args=(--date today --output "pcc_labor_tenders_${{ steps.taipei-date.outputs.today }}.xlsx" --skip-if-drive-file-exists)
          python run_daily_workflow.py "${args[@]}"

      - name: Upload Excel artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pcc-labor-tenders-output
          path: Web Crawler/*.xlsx
          if-no-files-found: ignore






