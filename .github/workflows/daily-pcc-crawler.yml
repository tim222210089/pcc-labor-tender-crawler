name: Daily PCC Labor Tender Crawler

on:
  workflow_dispatch:
    inputs:
      send_weekly_summary:
        description: Send Gmail weekly summary after success
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # 08:00 Asia/Taipei every weekday.
    - cron: '0 0 * * 1-5'
    # 08:15 Asia/Taipei every Monday, with weekly Gmail summary.
    - cron: '15 0 * * 1'

permissions:
  contents: read

jobs:
  crawl-upload-notify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web Crawler
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      GMAIL_CLIENT_OR_SERVICE_CONFIG: ${{ secrets.GMAIL_CLIENT_OR_SERVICE_CONFIG }}
      GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: Web Crawler/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest -v

      - name: Decide weekly summary
        id: weekly
        shell: bash
        run: |
          weekly=false
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "15 0 * * 1" ]]; then
            weekly=true
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.send_weekly_summary }}" == "true" ]]; then
            weekly=true
          fi
          echo "send_weekly_summary=${weekly}" >> "$GITHUB_OUTPUT"

      - name: Run crawler workflow
        run: |
          args=(--date today --output pcc_labor_tenders_today.xlsx)
          if [[ "${{ steps.weekly.outputs.send_weekly_summary }}" == "true" ]]; then
            args+=(--send-weekly-summary)
          fi
          python run_daily_workflow.py "${args[@]}"

      - name: Upload Excel artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pcc-labor-tenders-output
          path: Web Crawler/*.xlsx
          if-no-files-found: ignore




